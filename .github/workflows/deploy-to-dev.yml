name: 'Deploy to Dev Environment'

on:
    push:
        branches:
            - 'develop'
            - 'feature/*'

env:
    ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    ARM_CLIENT_ID: ${{ secrets.AZURE_APP_CLIENT_ID }}
    ARM_CLIENT_SECRET: ${{ secrets.AZURE_APP_CLIENT_SECRET }}
    ARM_TENANT_ID: ${{ secrets.AZURE_APP_TENANT_ID }}

jobs:
    terraform:
        name: 'Terraform'
        runs-on: ubuntu-latest
        environment:
            name: 'Development'
        env:
            TF_VAR_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
            TF_VAR_app_service_plan_name: ${{ vars.AZURE_APP_SERVICE_PLAN_NAME }}
            TF_VAR_app_service_plan_sku_name: ${{ vars.AZURE_APP_SERVICE_PLAN_SKU_NAME }}
            TF_VAR_app_insights_name: ${{ vars.AZURE_APP_INSIGHTS_NAME }}
            TF_VAR_api_service_name: ${{ vars.AZURE_API_SERVICE_NAME }}
            
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
            
            - name: Terraform Init
              run: terraform init
              working-directory: terraform

            - name: Import Terraform State
              run: terraform import azurerm_resource_group.nebamgmt-rg /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.AZURE_RESOURCE_GROUP_NAME }}
              working-directory: terraform

            - name: Terraform Validate
              run: terraform validate
              working-directory: terraform

            - name: Terraform Apply
              run: terraform apply -auto-approve
              working-directory: terraform
    
    deploy-api:
        name: 'Deploy API'
        runs-on: ubuntu-latest
        needs: terraform
        env:
            AZURE_API_NAME: ${{ vars.AZURE_API_SERVICE_NAME }}
            AZURE_API_PACKAGE_PATH: src/Neba.Api/publish
            CONFIGURATION: Release
            DOTNET_CORE_VERSION: 8.0.x
            WORKING_DIRECTORY: src/Neba.Api
        
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
            
            - name: Restore
              run: dotnet restore "${{ env.WORKING_DIRECTORY }}"
            
            - name: Build
              run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore
            
            - name: Publish
              run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output "${{ env.AZURE_API_PACKAGE_PATH }}"

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  creds: '{"subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID}}", "clientId": "${{ secrets.AZURE_APP_CLIENT_ID }}", "clientSecret": "${{ secrets.AZURE_APP_CLIENT_SECRET }}", "tenantId": "${{ secrets.AZURE_APP_TENANT_ID }}"}'
            
            - name: Deploy API
              run: |
                az configure --defaults group=${{ vars.AZURE_RESOURCE_GROUP_NAME }} web=${{ vars.AZURE_API_SERVICE_NAME }}
                az webapp up --name ${{ vars.AZURE_API_SERVICE_NAME}} --src "${{ env.AZURE_API_PACKAGE_PATH }}"
