name: SonarCloud Analysis and Code Coverage

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "feature/*", "hotfix/*", "release/*" ]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'  # adjust this to your .NET version

      - name: Restore dependencies
        run: dotnet restore Neba.sln

      - name: Build
        run: dotnet build Neba.sln --no-restore

      - name: Test with coverage
        run: dotnet test Neba.sln --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura

      - name: Upload coverage report
        uses: actions/upload-artifact@v2
        with:
          name: coverage-report
          path: **/coverage.cobertura.xml

  sonarcloud-analysis:
    needs: build-test-coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v2
        with:
          name: coverage-report

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args:
            -Dsonar.projectKey=bowlneba_neba-management
            -Dsonar.organization=bowlneba
            -Dsonar.coverageReportPaths=coverage-report/coverage.cobertura.xml  # Path to your coverage report
