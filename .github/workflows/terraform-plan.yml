name: 'Terraform Plan'

on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Selected Environment'
                required: true
                default: 'Development'
                type: choice
                options:
                    - 'Development'
                    - 'Staging'
                    - 'Production'

env:
    ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    ARM_CLIENT_ID: ${{ secrets.AZURE_APP_CLIENT_ID }}
    ARM_CLIENT_SECRET: ${{ secrets.AZURE_APP_CLIENT_SECRET }}
    ARM_TENANT_ID: ${{ secrets.AZURE_APP_TENANT_ID }}

jobs:
    terraform:
        name: 'Terraform'
        runs-on: ubuntu-latest
        environment:
            name: ${{ github.event.inputs.environment }}
        env:
            TF_VAR_system_admin_email: ${{ vars.SYSTEM_ADMIN_EMAIL }}
            TF_VAR_manager_email: ${{ vars.MANAGER_EMAIL }}
            TF_VAR_api_service_name: ${{ vars.AZURE_API_SERVICE_NAME }}
            TF_VAR_ui_service_name: ${{ vars.AZURE_UI_SERVICE_NAME }}
            TF_VAR_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
            
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
            
            - name: Terraform Init
              run: terraform init -backend-config="resource_group_name=${{ vars.AZURE_RESOURCE_GROUP_NAME }}" -backend-config="storage_account_name=${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}" -backend-config="container_name=${{ vars.AZURE_STORAGE_CONTAINER_NAME }}"
              working-directory: terraform

            - name: Terraform Validate
              run: terraform validate
              working-directory: terraform

            - name: Terraform Plan
              id: plan
              run: |
                set +e
                output=$(terraform plan -var-file ${{ vars.TERRAFORM_TFVARS_FILE }} -no-color -out=tfplan)
                echo "$output"
                echo "::set-output name=has_changes::$(echo "$output" | grep -qE "\+ create|~ update in-place" && echo "true" || echo "false")"
              working-directory: terraform